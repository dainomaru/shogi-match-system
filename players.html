<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名簿管理 | さくら将棋教室 対局管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#9750;</div>
      <h2>さくら将棋教室<br>対局管理システム</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">&#128200;</span><span>ダッシュボード</span></a>
      <a href="teai.html"><span class="nav-icon">&#9822;</span><span>受付／手合い</span></a>
      <a href="matches.html"><span class="nav-icon">&#128196;</span><span>対局管理</span></a>
      <a href="players.html" class="active"><span class="nav-icon">&#128100;</span><span>名簿管理</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logoutBtn">ログアウト</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">名簿管理</div>
      <div class="topbar-user"><span id="currentUser"></span> さん</div>
    </header>

    <main class="page-body">
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin:0;border:none;padding:0">会員名簿</div>
          <button class="btn btn-primary btn-sm" id="addPlayerBtn">＋ 会員追加</button>
        </div>

        <div class="table-wrapper" style="margin-top:16px">
          <table>
            <thead>
              <tr>
                <th>会員ID</th>
                <th>名前</th>
                <th>よみがな</th>
                <th>棋力</th>
                <th>会員種類</th>
                <th>勝</th>
                <th>負</th>
                <th>勝率</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="playersBody">
              <tr><td colspan="9" style="text-align:center;padding:24px;color:#999">データなし</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 会員追加・編集モーダル -->
<div class="modal-overlay" id="playerModal">
  <div class="modal">
    <div class="modal-title" id="pModalTitle">会員を追加</div>
    <form id="playerForm">
      <input type="hidden" id="pEditId">
      <div class="form-row">
        <div class="form-group">
          <label>名前 *</label>
          <input type="text" id="pName" placeholder="例：山田 太郎" required>
        </div>
        <div class="form-group">
          <label>よみがな</label>
          <input type="text" id="pKana" placeholder="例：やまだたろう">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>棋力</label>
          <select id="pKyu">
            <option value="">未設定</option>
            <option value="30級">30級</option><option value="29級">29級</option><option value="28級">28級</option>
            <option value="27級">27級</option><option value="26級">26級</option><option value="25級">25級</option>
            <option value="24級">24級</option><option value="23級">23級</option><option value="22級">22級</option>
            <option value="21級">21級</option><option value="20級">20級</option><option value="19級">19級</option>
            <option value="18級">18級</option><option value="17級">17級</option><option value="16級">16級</option>
            <option value="15級">15級</option><option value="14級">14級</option><option value="13級">13級</option>
            <option value="12級">12級</option><option value="11級">11級</option><option value="10級">10級</option>
            <option value="9級">9級</option><option value="8級">8級</option><option value="7級">7級</option>
            <option value="6級">6級</option><option value="5級">5級</option><option value="4級">4級</option>
            <option value="3級">3級</option><option value="2級">2級</option><option value="1級">1級</option>
            <option value="初段">初段</option><option value="二段">二段</option><option value="三段">三段</option>
            <option value="四段">四段</option><option value="五段">五段</option><option value="六段">六段</option>
            <option value="七段">七段</option><option value="八段">八段</option><option value="九段">九段</option>
          </select>
        </div>
        <div class="form-group">
          <label>会員種類</label>
          <select id="pType">
            <option value="正会員">正会員</option>
            <option value="指導員">指導員</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>備考</label>
        <textarea id="pNote" rows="2" placeholder="メモ・備考など"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="pCancelModal">キャンセル</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  if (sessionStorage.getItem('loggedIn') !== '1') { location.href = 'index.html'; }
  document.getElementById('currentUser').textContent = sessionStorage.getItem('userId') || '';
  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault(); sessionStorage.clear(); location.href = 'index.html';
  });

  DB.initSampleData();

  const KYU_LIST = ['30級','29級','28級','27級','26級','25級','24級','23級','22級','21級','20級','19級','18級','17級','16級','15級','14級','13級','12級','11級','10級','9級','8級','7級','6級','5級','4級','3級','2級','1級','初段','二段','三段','四段','五段','六段','七段','八段','九段'];

  function kyuOptions(current) {
    return ['', ...KYU_LIST].map(k =>
      `<option value="${k}" ${k === (current || '') ? 'selected' : ''}>${k || '―'}</option>`
    ).join('');
  }

  function updateKyu(id, kyu) {
    DB.updatePlayer(id, { kyu, levelWins: 0 });
  }

  function promoProgress(p) {
    if (!p.kyu || !DB.nextRank(p.kyu)) return '';
    const isDan = ['初段','二段','三段','四段','五段','六段','七段','八段','九段'].includes(p.kyu);
    const threshold = isDan ? 5 : 3;
    const wins = p.levelWins || 0;
    const pct = Math.round(wins / threshold * 100);
    return `<div style="margin-top:3px;font-size:11px;color:#888">${wins}/${threshold}勝
      <span style="display:inline-block;width:48px;height:5px;background:#eee;border-radius:3px;vertical-align:middle;margin-left:3px">
        <span style="display:block;width:${pct}%;height:100%;background:#8b3a3a;border-radius:3px"></span>
      </span>
    </div>`;
  }

  function getStats(playerId) {
    const matches = DB.getMatches().filter(m => m.status === 'done');
    let wins = 0, losses = 0, draws = 0;
    matches.forEach(m => {
      if (m.blackId === playerId || m.whiteId === playerId) {
        if (m.result === 'black') { m.blackId === playerId ? wins++ : losses++; }
        else if (m.result === 'white') { m.whiteId === playerId ? wins++ : losses++; }
        else if (m.result === 'draw') { draws++; }
      }
    });
    const total = wins + losses + draws;
    const rate = total > 0 ? (wins / total * 100).toFixed(1) + '%' : '―';
    return { wins, losses, draws, rate };
  }

  function renderPlayers() {
    const players = DB.getPlayers();
    const tbody = document.getElementById('playersBody');
    if (players.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:#999">会員データなし</td></tr>';
      return;
    }
    tbody.innerHTML = players.map(p => {
      const s = getStats(p.id);
      return `
        <tr>
          <td>${p.memberCode || p.id}</td>
          <td><strong>${p.name}</strong></td>
          <td style="font-size:12px;color:#666">${p.kana || ''}</td>
          <td>
            <select onchange="updateKyu(${p.id}, this.value)" style="font-size:13px;padding:2px 6px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer">
              ${kyuOptions(p.kyu)}
            </select>
            ${promoProgress(p)}
          </td>
          <td><span class="badge ${p.memberType === '指導員' ? 'badge-black' : 'badge-pending'}">${p.memberType || '正会員'}</span></td>
          <td>${s.wins}</td>
          <td>${s.losses}</td>
          <td>${s.rate}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openEdit(${p.id})">編集</button>
            <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deletePlayer(${p.id})">退会</button>
          </td>
        </tr>`;
    }).join('');
  }

  function openAdd() {
    document.getElementById('pModalTitle').textContent = '会員を追加';
    document.getElementById('pEditId').value = '';
    document.getElementById('pName').value = '';
    document.getElementById('pKana').value = '';
    document.getElementById('pKyu').value = '';
    document.getElementById('pType').value = '正会員';
    document.getElementById('pNote').value = '';
    document.getElementById('playerModal').classList.add('open');
  }

  function openEdit(id) {
    const p = DB.getPlayers().find(x => x.id === id);
    if (!p) return;
    document.getElementById('pModalTitle').textContent = '会員を編集';
    document.getElementById('pEditId').value = id;
    document.getElementById('pName').value = p.name;
    document.getElementById('pKana').value = p.kana || '';
    document.getElementById('pKyu').value = p.kyu || '';
    document.getElementById('pType').value = p.memberType || '正会員';
    document.getElementById('pNote').value = p.note || '';
    document.getElementById('playerModal').classList.add('open');
  }

  function deletePlayer(id) {
    if (!confirm('この会員を退会処理しますか？')) return;
    DB.deletePlayer(id);
    renderPlayers();
  }

  document.getElementById('addPlayerBtn').addEventListener('click', openAdd);
  document.getElementById('pCancelModal').addEventListener('click', () => {
    document.getElementById('playerModal').classList.remove('open');
  });
  document.getElementById('playerModal').addEventListener('click', e => {
    if (e.target === document.getElementById('playerModal'))
      document.getElementById('playerModal').classList.remove('open');
  });

  document.getElementById('playerForm').addEventListener('submit', e => {
    e.preventDefault();
    const data = {
      name: document.getElementById('pName').value.trim(),
      kana: document.getElementById('pKana').value.trim(),
      kyu: document.getElementById('pKyu').value,
      memberType: document.getElementById('pType').value,
      note: document.getElementById('pNote').value,
    };
    const editId = document.getElementById('pEditId').value;
    if (editId) {
      DB.updatePlayer(parseInt(editId), data);
    } else {
      DB.addPlayer(data);
    }
    document.getElementById('playerModal').classList.remove('open');
    renderPlayers();
  });

  renderPlayers();
</script>
</body>
</html>
