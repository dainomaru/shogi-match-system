<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | さくら将棋教室 対局管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#9750;</div>
      <h2>さくら将棋教室 対局管理システム</h2>
    </div>
    <div class="sidebar-mascot">
      <svg width="78" height="86" viewBox="0 0 80 88" xmlns="http://www.w3.org/2000/svg">
        <path d="M4,78 Q18,70 32,78 Q46,86 60,78 Q70,74 76,78" stroke="#4fc3f7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M0,85 Q14,77 28,85 Q42,93 58,85 Q68,81 78,85" stroke="#90e0ef" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M27,61 L40,69 L53,61 L53,79 Q40,86 27,79 Z" fill="#0d2e7a"/>
        <path d="M27,61 L40,68 L53,61" stroke="#fff" stroke-width="2.5" fill="none"/>
        <path d="M29,66 L40,72 L51,66" stroke="#b8d4ff" stroke-width="1.5" fill="none"/>
        <path d="M38,64 L40,73 L42,64" fill="#cc2200" opacity="0.75"/>
        <circle cx="40" cy="37" r="19" fill="#ffe0b2"/>
        <ellipse cx="40" cy="20" rx="21" ry="5" fill="#0d2e7a"/>
        <rect x="22" y="13" width="36" height="9" rx="4.5" fill="#0d2e7a"/>
        <rect x="26" y="16" width="28" height="3" rx="1.5" fill="#ffffff"/>
        <circle cx="33" cy="38" r="4.2" fill="#1a1a2e"/>
        <circle cx="47" cy="38" r="4.2" fill="#1a1a2e"/>
        <circle cx="34.5" cy="36.5" r="1.5" fill="#fff"/>
        <circle cx="48.5" cy="36.5" r="1.5" fill="#fff"/>
        <path d="M29,31 Q33,29 37,31" stroke="#795548" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M43,31 Q47,29 51,31" stroke="#795548" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M33,46 Q40,52 47,46" stroke="#bf7550" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <circle cx="26" cy="42" r="4.5" fill="#ffccbc" opacity="0.5"/>
        <circle cx="54" cy="42" r="4.5" fill="#ffccbc" opacity="0.5"/>
        <line x1="53" y1="64" x2="63" y2="53" stroke="#ffe0b2" stroke-width="6" stroke-linecap="round"/>
        <g transform="translate(58,41) rotate(12)">
          <polygon points="5,0 10,3 10,16 0,16 0,3" fill="#f5deb3" stroke="#8b6914" stroke-width="1.3"/>
          <text x="5" y="12" font-size="8" text-anchor="middle" fill="#7a1a1a" font-weight="bold" font-family="serif">王</text>
        </g>
      </svg>
      <div style="font-size:10px;color:rgba(180,220,255,0.7);margin-top:2px;letter-spacing:1px">うみぼーや</div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="active"><span class="nav-icon">&#128200;</span><span>ダッシュボード</span></a>
      <a href="teai.html"><span class="nav-icon">&#9822;</span><span>受付／手合い</span></a>
      <a href="matches.html"><span class="nav-icon">&#128196;</span><span>対局管理</span></a>
      <a href="players.html"><span class="nav-icon">&#128100;</span><span>名簿管理</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logoutBtn">ログアウト</a>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">ダッシュボード</div>
      <div class="topbar-user">
        <span id="currentUser"></span> さん
      </div>
    </header>

    <main class="page-body">
      <!-- 統計カード -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="statPlayers">0</div>
          <div class="stat-label">登録棋士数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statMatches">0</div>
          <div class="stat-label">総対局数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statDone">0</div>
          <div class="stat-label">終了対局</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statPending">0</div>
          <div class="stat-label">未了対局</div>
        </div>
      </div>

      <!-- 直近の対局 -->
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin:0;border:none;padding:0">直近の対局</div>
          <a href="matches.html" class="btn btn-outline btn-sm">全て見る</a>
        </div>
        <div class="table-wrapper" style="margin-top:16px">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>ラウンド</th>
                <th>先手</th>
                <th>後手</th>
                <th>結果</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="recentMatchesBody">
              <tr><td colspan="6" style="text-align:center;padding:24px;color:#999">データなし</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 棋士ランキング -->
      <div class="card">
        <div class="card-title">棋士成績ランキング</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>順位</th><th>棋士名</th><th>段位</th><th>勝</th><th>負</th><th>引分</th><th>勝率</th></tr>
            </thead>
            <tbody id="rankingBody">
              <tr><td colspan="7" style="text-align:center;padding:24px;color:#999">データなし</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/auth.js" type="module"></script>
<script src="js/data.js"></script>
<script>
  // 認証チェック
  if (sessionStorage.getItem('loggedIn') !== '1') { location.href = 'index.html'; }
  document.getElementById('currentUser').textContent = sessionStorage.getItem('userId') || '';
  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    sessionStorage.clear();
    location.href = 'index.html';
  });

  DB.initSampleData();

  function resultLabel(r) {
    if (r === 'black') return '<span class="badge badge-black">先手勝</span>';
    if (r === 'white') return '<span class="badge badge-white">後手勝</span>';
    if (r === 'draw')  return '<span class="badge badge-draw">引分</span>';
    return '<span class="badge badge-pending">未了</span>';
  }

  function statusLabel(s) {
    return s === 'done'
      ? '<span class="badge badge-done">終了</span>'
      : '<span class="badge badge-pending">未了</span>';
  }

  function playerName(id) {
    const p = DB.getPlayers().find(x => x.id === id);
    return p ? p.name : '―';
  }

  function renderDashboard() {
    const players = DB.getPlayers();
    const matches = DB.getMatches();
    const done = matches.filter(m => m.status === 'done');
    const pending = matches.filter(m => m.status !== 'done');

    document.getElementById('statPlayers').textContent = players.length;
    document.getElementById('statMatches').textContent = matches.length;
    document.getElementById('statDone').textContent = done.length;
    document.getElementById('statPending').textContent = pending.length;

    // 直近5件
    const recent = [...matches].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
    const tbody = document.getElementById('recentMatchesBody');
    if (recent.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#999">対局データなし</td></tr>';
    } else {
      tbody.innerHTML = recent.map(m => `
        <tr>
          <td>${m.date}</td>
          <td>${m.round || '―'}</td>
          <td>${playerName(m.blackId)}</td>
          <td>${playerName(m.whiteId)}</td>
          <td>${resultLabel(m.result)}</td>
          <td>${statusLabel(m.status)}</td>
        </tr>`).join('');
    }

    // ランキング
    const stats = {};
    players.forEach(p => { stats[p.id] = { wins: 0, losses: 0, draws: 0 }; });
    matches.filter(m => m.status === 'done').forEach(m => {
      if (!stats[m.blackId]) stats[m.blackId] = { wins: 0, losses: 0, draws: 0 };
      if (!stats[m.whiteId]) stats[m.whiteId] = { wins: 0, losses: 0, draws: 0 };
      if (m.result === 'black') { stats[m.blackId].wins++; stats[m.whiteId].losses++; }
      else if (m.result === 'white') { stats[m.whiteId].wins++; stats[m.blackId].losses++; }
      else if (m.result === 'draw') { stats[m.blackId].draws++; stats[m.whiteId].draws++; }
    });

    const ranked = players.map(p => {
      const s = stats[p.id] || { wins: 0, losses: 0, draws: 0 };
      const total = s.wins + s.losses + s.draws;
      const rate = total > 0 ? (s.wins / total * 100).toFixed(1) : '―';
      return { ...p, ...s, rate };
    }).sort((a, b) => {
      const ra = typeof a.rate === 'string' ? -1 : parseFloat(a.rate);
      const rb = typeof b.rate === 'string' ? -1 : parseFloat(b.rate);
      return rb - ra;
    });

    const rbody = document.getElementById('rankingBody');
    if (ranked.length === 0) {
      rbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#999">棋士データなし</td></tr>';
    } else {
      rbody.innerHTML = ranked.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${p.name}</td>
          <td>${p.kyu || '―'}</td>
          <td>${p.wins}</td>
          <td>${p.losses}</td>
          <td>${p.draws}</td>
          <td>${p.rate !== '―' ? p.rate + '%' : '―'}</td>
        </tr>`).join('');
    }
  }

  renderDashboard();
</script>
</body>
</html>
