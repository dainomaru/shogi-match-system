<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>対局管理 | さくら将棋教室 対局管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#9750;</div>
      <h2>さくら将棋教室 対局管理システム</h2>
    </div>

        <path d="M4,78 Q18,70 32,78 Q46,86 60,78 Q70,74 76,78" stroke="#4fc3f7" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <path d="M27,61 L40,69 L53,61 L53,79 Q40,86 27,79 Z" fill="#0d2e7a"/>
        <path d="M27,61 L40,68 L53,61" stroke="#fff" stroke-width="2.5" fill="none"/>
        <path d="M29,66 L40,72 L51,66" stroke="#b8d4ff" stroke-width="1.5" fill="none"/>
        <path d="M38,64 L40,73 L42,64" fill="#cc2200" opacity="0.75"/>
        <circle cx="40" cy="37" r="19" fill="#ffe0b2"/>
        <ellipse cx="40" cy="20" rx="21" ry="5" fill="#0d2e7a"/>
        <rect x="22" y="13" width="36" height="9" rx="4.5" fill="#0d2e7a"/>
        <rect x="26" y="16" width="28" height="3" rx="1.5" fill="#ffffff"/>
        <circle cx="33" cy="38" r="4.2" fill="#1a1a2e"/>
        <circle cx="47" cy="38" r="4.2" fill="#1a1a2e"/>
        <circle cx="34.5" cy="36.5" r="1.5" fill="#fff"/>
        <circle cx="48.5" cy="36.5" r="1.5" fill="#fff"/>
        <path d="M29,31 Q33,29 37,31" stroke="#795548" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M43,31 Q47,29 51,31" stroke="#795548" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M33,46 Q40,52 47,46" stroke="#bf7550" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <circle cx="26" cy="42" r="4.5" fill="#ffccbc" opacity="0.5"/>
        <circle cx="54" cy="42" r="4.5" fill="#ffccbc" opacity="0.5"/>
        <line x1="53" y1="64" x2="63" y2="53" stroke="#ffe0b2" stroke-width="6" stroke-linecap="round"/>
        <g transform="translate(58,41) rotate(12)">
          <polygon points="5,0 10,3 10,16 0,16 0,3" fill="#f5deb3" stroke="#8b6914" stroke-width="1.3"/>
          <text x="5" y="12" font-size="8" text-anchor="middle" fill="#7a1a1a" font-weight="bold" font-family="serif">王</text>
        </g>
      </svg>
      <div style="font-size:10px;color:rgba(180,220,255,0.7);margin-top:2px;letter-spacing:1px">うみぼーや</div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">&#128200;</span><span>ダッシュボード</span></a>
      <a href="teai.html"><span class="nav-icon">&#9822;</span><span>受付／手合い</span></a>
      <a href="matches.html" class="active"><span class="nav-icon">&#128196;</span><span>対局管理</span></a>
      <a href="players.html"><span class="nav-icon">&#128100;</span><span>名簿管理</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logoutBtn">ログアウト</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">対局管理</div>
      <div class="topbar-user"><span id="currentUser"></span> さん</div>
    </header>

    <main class="page-body">
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin:0;border:none;padding:0">対局一覧</div>
          <button class="btn btn-primary btn-sm" id="addMatchBtn">＋ 対局追加</button>
        </div>

        <!-- フィルター -->
        <div style="display:flex;gap:12px;margin:16px 0;flex-wrap:wrap">
          <select id="filterRound" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px">
            <option value="">ラウンド: 全て</option>
          </select>
          <select id="filterStatus" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px">
            <option value="">状態: 全て</option>
            <option value="pending">未了</option>
            <option value="done">終了</option>
          </select>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>ラウンド</th>
                <th>先手</th>
                <th>後手</th>
                <th>手合い</th>
                <th>結果</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="matchesBody">
              <tr><td colspan="8" style="text-align:center;padding:24px;color:#999">データなし</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 昇格通知モーダル -->
<div class="modal-overlay" id="promoModal">
  <div class="modal" style="max-width:400px;text-align:center;padding:32px 24px">
    <div style="font-size:52px;line-height:1.1;margin-bottom:8px">&#127881;</div>
    <div class="modal-title" style="font-size:20px;margin-bottom:16px">昇格おめでとうございます！</div>
    <div id="promoContent" style="margin:0 0 24px"></div>
    <button class="btn btn-primary" style="min-width:120px" onclick="document.getElementById('promoModal').classList.remove('open')">閉じる</button>
  </div>
</div>

<!-- 対局追加・編集モーダル -->
<div class="modal-overlay" id="matchModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">対局を追加</div>
    <form id="matchForm">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label>日付 *</label>
          <input type="date" id="mDate" required>
        </div>
        <div class="form-group">
          <label>ラウンド</label>
          <input type="text" id="mRound" placeholder="例：第1回戦">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>先手 *</label>
          <select id="mBlack" required>
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>後手 *</label>
          <select id="mWhite" required>
            <option value="">選択してください</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>手合い</label>
          <select id="mTeai">
            <option value="平手">平手</option>
            <option value="香落ち">香落ち</option>
            <option value="角落ち">角落ち</option>
            <option value="飛車落ち">飛車落ち</option>
            <option value="飛車香落ち">飛車香落ち</option>
            <option value="二枚落ち">二枚落ち</option>
            <option value="四枚落ち">四枚落ち</option>
            <option value="六枚落ち">六枚落ち</option>
            <option value="八枚落ち">八枚落ち</option>
            <option value="十枚落ち">十枚落ち</option>
          </select>
        </div>
        <div class="form-group">
          <div id="mTeaiNote" style="font-size:12px;color:#888;padding-top:22px;line-height:1.4"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>結果</label>
          <select id="mResult">
            <option value="pending">未了</option>
            <option value="black">先手勝</option>
            <option value="white">後手勝</option>
            <option value="draw">引分</option>
          </select>
        </div>
        <div class="form-group">
          <label>状態</label>
          <select id="mStatus">
            <option value="pending">未了</option>
            <option value="done">終了</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>棋譜メモ</label>
        <textarea id="mKifu" rows="3" placeholder="棋譜や備考を入力"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="cancelModal">キャンセル</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </form>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  if (sessionStorage.getItem('loggedIn') !== '1') { location.href = 'index.html'; }
  document.getElementById('currentUser').textContent = sessionStorage.getItem('userId') || '';
  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault(); sessionStorage.clear(); location.href = 'index.html';
  });

  DB.initSampleData();

  function playerName(id) {
    const p = DB.getPlayers().find(x => x.id === id);
    return p ? p.name : '―';
  }

  function resultLabel(r) {
    if (r === 'black') return '<span class="badge badge-black">先手勝</span>';
    if (r === 'white') return '<span class="badge badge-white">後手勝</span>';
    if (r === 'draw')  return '<span class="badge badge-draw">引分</span>';
    return '<span class="badge badge-pending">未了</span>';
  }

  function statusLabel(s) {
    return s === 'done'
      ? '<span class="badge badge-done">終了</span>'
      : '<span class="badge badge-pending">未了</span>';
  }

  function populateRoundFilter() {
    const rounds = [...new Set(DB.getMatches().map(m => m.round).filter(Boolean))];
    const sel = document.getElementById('filterRound');
    sel.innerHTML = '<option value="">ラウンド: 全て</option>' +
      rounds.map(r => `<option value="${r}">${r}</option>`).join('');
  }

  function renderMatches() {
    const roundFilter = document.getElementById('filterRound').value;
    const statusFilter = document.getElementById('filterStatus').value;
    let matches = DB.getMatches();
    if (roundFilter) matches = matches.filter(m => m.round === roundFilter);
    if (statusFilter) matches = matches.filter(m => m.status === statusFilter);
    matches.sort((a, b) => new Date(b.date) - new Date(a.date));

    const tbody = document.getElementById('matchesBody');
    if (matches.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:#999">対局データなし</td></tr>';
      return;
    }
    tbody.innerHTML = matches.map(m => `
      <tr>
        <td>${m.date}</td>
        <td>${m.round || '―'}</td>
        <td>${playerName(m.blackId)}</td>
        <td>${playerName(m.whiteId)}</td>
        <td>${m.teai || '平手'}</td>
        <td style="white-space:nowrap">
          ${m.status !== 'done'
            ? `<button class="btn btn-sm" style="background:#0d2e7a;color:#fff;padding:3px 7px;font-size:12px" onclick="quickResult(${m.id},'black')">先手勝</button>
               <button class="btn btn-sm" style="background:#0277bd;color:#fff;padding:3px 7px;font-size:12px;margin:0 3px" onclick="quickResult(${m.id},'white')">後手勝</button>
               <button class="btn btn-outline btn-sm" style="padding:3px 7px;font-size:12px" onclick="quickResult(${m.id},'draw')">引分</button>`
            : resultLabel(m.result)
          }
        </td>
        <td>${statusLabel(m.status)}</td>
        <td style="white-space:nowrap">
          ${m.status === 'done' ? `<button class="btn btn-outline btn-sm" onclick="resetResult(${m.id})">取消</button>` : ''}
          <button class="btn btn-outline btn-sm" style="margin-left:4px" onclick="openEdit(${m.id})">編集</button>
          <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="deleteMatch(${m.id})">削除</button>
        </td>
      </tr>`).join('');
  }

  function populatePlayerSelects(blackVal, whiteVal) {
    const players = DB.getPlayers();
    const opts = players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    document.getElementById('mBlack').innerHTML = '<option value="">選択してください</option>' + opts;
    document.getElementById('mWhite').innerHTML = '<option value="">選択してください</option>' + opts;
    if (blackVal) document.getElementById('mBlack').value = blackVal;
    if (whiteVal) document.getElementById('mWhite').value = whiteVal;
  }

  function updateAutoTeai() {
    const blackId = parseInt(document.getElementById('mBlack').value);
    const whiteId = parseInt(document.getElementById('mWhite').value);
    const noteEl = document.getElementById('mTeaiNote');
    if (!blackId || !whiteId || blackId === whiteId) { noteEl.textContent = ''; return; }
    const pB = DB.getPlayers().find(p => p.id === blackId);
    const pW = DB.getPlayers().find(p => p.id === whiteId);
    const auto = DB.calcTeai(pB?.kyu, pW?.kyu);
    document.getElementById('mTeai').value = auto.teai;
    noteEl.innerHTML = auto.upper
      ? `棋力差より自動設定<br>${auto.upper === 'black' ? '先手' : '後手'}が上手`
      : '棋力差より自動設定<br>平手';
  }

  function openAdd() {
    document.getElementById('modalTitle').textContent = '対局を追加';
    document.getElementById('editId').value = '';
    document.getElementById('mDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('mRound').value = '';
    document.getElementById('mTeai').value = '平手';
    document.getElementById('mTeaiNote').textContent = '';
    document.getElementById('mResult').value = 'pending';
    document.getElementById('mStatus').value = 'pending';
    document.getElementById('mKifu').value = '';
    populatePlayerSelects('', '');
    document.getElementById('matchModal').classList.add('open');
  }

  function openEdit(id) {
    const m = DB.getMatches().find(x => x.id === id);
    if (!m) return;
    document.getElementById('modalTitle').textContent = '対局を編集';
    document.getElementById('editId').value = id;
    document.getElementById('mDate').value = m.date;
    document.getElementById('mRound').value = m.round || '';
    document.getElementById('mTeai').value = m.teai || '平手';
    document.getElementById('mTeaiNote').textContent = '';
    document.getElementById('mResult').value = m.result || 'pending';
    document.getElementById('mStatus').value = m.status || 'pending';
    document.getElementById('mKifu').value = m.kifu || '';
    populatePlayerSelects(m.blackId, m.whiteId);
    document.getElementById('matchModal').classList.add('open');
  }

  function quickResult(id, result) {
    const m = DB.getMatches().find(x => x.id === id);
    const wasPending = m && m.status !== 'done';
    DB.updateMatch(id, { result, status: 'done' });
    if (wasPending) {
      const promotions = [];
      if (result === 'black') { const p = DB.recordWin(m.blackId); if (p) promotions.push(p); }
      else if (result === 'white') { const p = DB.recordWin(m.whiteId); if (p) promotions.push(p); }
      if (promotions.length) showPromotions(promotions);
    }
    populateRoundFilter();
    renderMatches();
  }

  function showPromotions(list) {
    document.getElementById('promoContent').innerHTML = list.map(p => {
      const kind = ['初段','二段','三段','四段','五段','六段','七段','八段','九段'].includes(p.to) ? '昇段' : '昇級';
      return `<p style="font-size:16px;font-weight:bold;color:#0d47a1;margin:4px 0">${p.name} さん</p>
              <p style="font-size:18px;margin:4px 0">${p.from} &rarr; <strong>${p.to}</strong>　${kind}！</p>`;
    }).join('<hr style="margin:14px 0;border-color:#eee">');
    document.getElementById('promoModal').classList.add('open');
  }

  function resetResult(id) {
    if (!confirm('結果を取り消して「未了」に戻しますか？')) return;
    DB.updateMatch(id, { result: 'pending', status: 'pending' });
    populateRoundFilter();
    renderMatches();
  }

  function deleteMatch(id) {
    if (!confirm('この対局を削除しますか？')) return;
    DB.deleteMatch(id);
    populateRoundFilter();
    renderMatches();
  }

  document.getElementById('mBlack').addEventListener('change', updateAutoTeai);
  document.getElementById('mWhite').addEventListener('change', updateAutoTeai);
  document.getElementById('addMatchBtn').addEventListener('click', openAdd);
  document.getElementById('cancelModal').addEventListener('click', () => {
    document.getElementById('matchModal').classList.remove('open');
  });
  document.getElementById('matchModal').addEventListener('click', e => {
    if (e.target === document.getElementById('matchModal'))
      document.getElementById('matchModal').classList.remove('open');
  });

  document.getElementById('matchForm').addEventListener('submit', e => {
    e.preventDefault();
    const blackId = parseInt(document.getElementById('mBlack').value);
    const whiteId = parseInt(document.getElementById('mWhite').value);
    if (blackId === whiteId) { alert('先手と後手に同じ棋士は選択できません。'); return; }

    const data = {
      date: document.getElementById('mDate').value,
      round: document.getElementById('mRound').value,
      blackId,
      whiteId,
      teai: document.getElementById('mTeai').value || '平手',
      result: document.getElementById('mResult').value,
      status: document.getElementById('mStatus').value,
      kifu: document.getElementById('mKifu').value,
    };

    const editId = document.getElementById('editId').value;
    if (editId) {
      DB.updateMatch(parseInt(editId), data);
    } else {
      DB.addMatch(data);
    }
    document.getElementById('matchModal').classList.remove('open');
    populateRoundFilter();
    renderMatches();
  });

  document.getElementById('filterRound').addEventListener('change', renderMatches);
  document.getElementById('filterStatus').addEventListener('change', renderMatches);

  populateRoundFilter();
  renderMatches();
</script>
</body>
</html>
