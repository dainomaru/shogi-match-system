<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受付／手合い | さくら将棋教室 対局管理システム</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .player-checklist { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .player-check-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; transition: background 0.15s; }
    .player-check-item:hover { background: #fdf6f6; }
    .player-check-item.checked { background: #f3e8e8; border-color: #8b3a3a; }
    .player-check-item input { accent-color: #8b3a3a; }
    .player-check-item .p-name { font-weight: bold; font-size: 14px; }
    .player-check-item .p-kyu { font-size: 12px; color: #666; }
    .step-label { font-size: 13px; font-weight: bold; color: #8b3a3a; margin-bottom: 8px; display: block; }

    /* ドラッグ&ドロップ */
    .player-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: #fff;
      border: 1.5px solid #c8a0a0; border-radius: 20px;
      cursor: grab; font-size: 13px; user-select: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: all .15s;
      white-space: nowrap;
    }
    .player-chip:hover { background: #fdf0f0; border-color: #8b3a3a; transform: translateY(-1px); box-shadow: 0 2px 6px rgba(139,58,58,.2); }
    .player-chip.dragging { opacity: .3; cursor: grabbing; }
    .player-chip .chip-kyu { font-size: 11px; color: #999; }

    #availablePool {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 56px; padding: 10px;
      border: 2px dashed #ccc; border-radius: 8px; background: #f9f9f9;
      transition: border-color .15s, background .15s;
    }
    #availablePool.drag-over { border-color: #8b3a3a; background: #fdf6f6; }

    .drop-zone {
      min-height: 36px; min-width: 140px; padding: 3px 8px;
      border: 2px dashed #ddd; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      background: #fafafa; transition: border-color .15s, background .15s;
      color: #ccc; font-size: 12px;
    }
    .drop-zone:empty::before { content: 'ドロップ'; }
    .drop-zone.has-player { border-style: solid; border-color: #e0c0c0; background: #fff; justify-content: flex-start; color: inherit; }
    .drop-zone.has-player:empty::before { content: ''; }
    .drop-zone.drag-over { border-color: #8b3a3a !important; background: #fdf0f0 !important; }

    .board-table { width: 100%; border-collapse: collapse; }
    .board-table th { font-size: 12px; font-weight: normal; color: #888; padding: 4px 8px; border-bottom: 1px solid #eee; text-align: left; }
    .board-table td { padding: 5px 6px; vertical-align: middle; }
    .board-num-cell { font-size: 13px; color: #888; font-weight: bold; white-space: nowrap; width: 46px; }
    .vs-cell { color: #bbb; text-align: center; font-size: 13px; width: 24px; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#9750;</div>
      <h2>さくら将棋教室<br>対局管理システム</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">&#128200;</span><span>ダッシュボード</span></a>
      <a href="teai.html" class="active"><span class="nav-icon">&#9822;</span><span>受付／手合い</span></a>
      <a href="matches.html"><span class="nav-icon">&#128196;</span><span>対局管理</span></a>
      <a href="players.html"><span class="nav-icon">&#128100;</span><span>名簿管理</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" id="logoutBtn">ログアウト</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-title">受付／手合い組み合わせ</div>
      <div class="topbar-user"><span id="currentUser"></span> さん</div>
    </header>

    <main class="page-body">

      <!-- STEP1: 受付 -->
      <div class="card">
        <span class="step-label">STEP 1 ― 本日の参加者にチェックを入れてください</span>
        <div style="display:flex;gap:12px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
          <select id="filterType" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px">
            <option value="">全員</option>
            <option value="正会員">正会員</option>
            <option value="指導員">指導員</option>
          </select>
          <button class="btn btn-outline btn-sm" id="checkAllBtn">全員チェック</button>
          <button class="btn btn-secondary btn-sm" id="uncheckAllBtn">全解除</button>
          <span id="checkedCount" style="font-size:13px;color:#555">0名 選択中</span>
        </div>
        <div class="player-checklist" id="playerChecklist"></div>
      </div>

      <!-- STEP2: ドラッグ&ドロップ手合い -->
      <div class="card">
        <span class="step-label">STEP 2 ― 参加者を盤の先手・後手へドラッグして手合いを決定してください</span>

        <!-- 自動組み合わせ -->
        <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
          <span style="font-size:13px;color:#666;font-weight:bold">自動組み合わせ：</span>
          <button class="btn btn-outline btn-sm" onclick="autoPair('kyu')">棋力順</button>
          <button class="btn btn-outline btn-sm" onclick="autoPair('swiss')">スイス式</button>
          <button class="btn btn-outline btn-sm" onclick="autoPair('random')">ランダム</button>
          <button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="clearAllPairings()">全クリア</button>
        </div>

        <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
          <!-- 未割当参加者プール -->
          <div style="flex:0 0 auto;min-width:160px;max-width:220px">
            <div style="font-size:12px;font-weight:bold;color:#555;margin-bottom:6px">未割当の参加者</div>
            <div id="availablePool"
              ondragover="poolDragOver(event)"
              ondrop="poolDrop(event)"
              ondragenter="poolDragEnter(event)"
              ondragleave="poolDragLeave(event)">
            </div>
          </div>

          <!-- 手合い表 -->
          <div style="flex:1;min-width:300px">
            <div style="font-size:12px;font-weight:bold;color:#555;margin-bottom:6px">手合い表</div>
            <table class="board-table">
              <thead>
                <tr>
                  <th class="board-num-cell">盤</th>
                  <th>先手</th>
                  <th class="vs-cell"></th>
                  <th>後手</th>
                  <th style="width:44px"></th>
                </tr>
              </thead>
              <tbody id="boardRows"></tbody>
            </table>
            <button class="btn btn-outline btn-sm" style="margin-top:10px;font-size:12px" onclick="addBoardRow()">＋ 盤を追加</button>
          </div>
        </div>

        <!-- 登録オプション -->
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid #eee;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap">
          <div class="form-group" style="margin:0">
            <label style="font-size:13px">ラウンド名</label>
            <input type="text" id="roundName" value="第1回戦" style="padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;width:140px;display:block;margin-top:4px">
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:13px">対局日</label>
            <input type="date" id="matchDate" style="padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;display:block;margin-top:4px">
          </div>
          <button class="btn btn-primary" onclick="registerMatches()">&#10003; 対局に登録</button>
        </div>
      </div>

      <!-- 本日の対局一覧 -->
      <div class="card">
        <div class="card-title">本日登録済みの対局</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>ラウンド</th><th>先手</th><th>後手</th><th>結果</th><th>状態</th><th>操作</th></tr>
            </thead>
            <tbody id="todayMatchesBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- 昇格通知モーダル -->
<div class="modal-overlay" id="promoModal">
  <div class="modal" style="max-width:400px;text-align:center;padding:32px 24px">
    <div style="font-size:52px;line-height:1.1;margin-bottom:8px">&#127881;</div>
    <div class="modal-title" style="font-size:20px;margin-bottom:16px">昇格おめでとうございます！</div>
    <div id="promoContent" style="margin:0 0 24px"></div>
    <button class="btn btn-primary" style="min-width:120px" onclick="document.getElementById('promoModal').classList.remove('open')">閉じる</button>
  </div>
</div>

<!-- 結果取消確認モーダル -->
<div class="modal-overlay" id="resetConfirmModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-title">結果を取り消しますか？</div>
    <p style="margin:12px 0 20px;color:#555;font-size:14px">この対局の結果を「未了」に戻します。</p>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('resetConfirmModal').classList.remove('open')">いいえ</button>
      <button class="btn btn-danger" id="confirmResetBtn">はい、取り消す</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  if (sessionStorage.getItem('loggedIn') !== '1') { location.href = 'index.html'; }
  document.getElementById('currentUser').textContent = sessionStorage.getItem('userId') || '';
  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault(); sessionStorage.clear(); location.href = 'index.html';
  });

  DB.initSampleData();
  document.getElementById('matchDate').value = new Date().toISOString().split('T')[0];

  // ===== STEP 1: 受付 =====
  let checkedIds = new Set();

  function kyuToNum(kyu) {
    if (!kyu) return 50;
    if (kyu === '九段') return 1; if (kyu === '八段') return 2; if (kyu === '七段') return 3;
    if (kyu === '六段') return 4; if (kyu === '五段') return 5; if (kyu === '四段') return 6;
    if (kyu === '三段') return 7; if (kyu === '二段') return 8; if (kyu === '初段') return 9;
    const m = kyu.match(/(\d+)級/);
    return m ? 9 + parseInt(m[1]) : 50;
  }

  function renderChecklist() {
    const filterType = document.getElementById('filterType').value;
    let players = DB.getPlayers();
    if (filterType) players = players.filter(p => (p.memberType || '正会員') === filterType);
    const div = document.getElementById('playerChecklist');
    div.innerHTML = players.map(p => `
      <label class="player-check-item ${checkedIds.has(p.id) ? 'checked' : ''}">
        <input type="checkbox" ${checkedIds.has(p.id) ? 'checked' : ''} onchange="toggleCheck(${p.id}, this)">
        <span>
          <div class="p-name">${p.name}</div>
          <div class="p-kyu">${p.kyu || '―'} / ${p.memberType || '正会員'}</div>
        </span>
      </label>`).join('');
    updateCount();
  }

  function toggleCheck(id, cb) {
    if (cb.checked) checkedIds.add(id);
    else { checkedIds.delete(id); removePlayerFromBoard(id); }
    cb.closest('.player-check-item').classList.toggle('checked', cb.checked);
    updateCount();
    renderPairingUI();
  }

  function updateCount() {
    document.getElementById('checkedCount').textContent = checkedIds.size + '名 選択中';
  }

  document.getElementById('filterType').addEventListener('change', renderChecklist);
  document.getElementById('checkAllBtn').addEventListener('click', () => {
    const ft = document.getElementById('filterType').value;
    DB.getPlayers().filter(p => !ft || (p.memberType || '正会員') === ft)
      .forEach(p => checkedIds.add(p.id));
    renderChecklist(); renderPairingUI();
  });
  document.getElementById('uncheckAllBtn').addEventListener('click', () => {
    checkedIds.clear(); clearAllPairings(); renderChecklist();
  });

  // ===== STEP 2: ドラッグ&ドロップ手合い =====
  let boardPairings = {}; // { boardNum: { black: playerId|null, white: playerId|null } }
  let boardCount = 0;
  let dragData = null; // { playerId, sourceKey }

  function addBoardRow(blackId, whiteId) {
    boardCount++;
    const num = boardCount;
    boardPairings[num] = { black: blackId ?? null, white: whiteId ?? null };
    const tbody = document.getElementById('boardRows');
    const tr = document.createElement('tr');
    tr.dataset.board = num;
    tr.innerHTML = `
      <td class="board-num-cell">${num}盤</td>
      <td><div class="drop-zone" id="slot-${num}-black"
        ondragover="slotDragOver(event)" ondrop="slotDrop(event,${num},'black')"
        ondragenter="slotDragEnter(event)" ondragleave="slotDragLeave(event)"></div></td>
      <td class="vs-cell">vs</td>
      <td><div class="drop-zone" id="slot-${num}-white"
        ondragover="slotDragOver(event)" ondrop="slotDrop(event,${num},'white')"
        ondragenter="slotDragEnter(event)" ondragleave="slotDragLeave(event)"></div></td>
      <td><button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 6px" onclick="clearRow(${num})">×</button></td>
    `;
    tbody.appendChild(tr);
    renderSlot(num, 'black');
    renderSlot(num, 'white');
  }

  function chipHtml(playerId, sourceKey) {
    const p = DB.getPlayers().find(x => x.id === playerId);
    if (!p) return '';
    return `<div class="player-chip" draggable="true"
      ondragstart="onChipDragStart(event,${playerId},'${sourceKey}')"
      ondragend="onChipDragEnd(event)">
      <strong>${p.name}</strong><span class="chip-kyu">${p.kyu || '―'}</span>
    </div>`;
  }

  function renderSlot(boardNum, side) {
    const slot = document.getElementById(`slot-${boardNum}-${side}`);
    if (!slot) return;
    const playerId = boardPairings[boardNum]?.[side];
    if (playerId != null) {
      slot.className = 'drop-zone has-player';
      slot.innerHTML = chipHtml(playerId, `slot-${boardNum}-${side}`);
    } else {
      slot.className = 'drop-zone';
      slot.innerHTML = '';
    }
  }

  function renderAvailablePool() {
    const assigned = new Set();
    Object.values(boardPairings).forEach(row => {
      if (row.black != null) assigned.add(row.black);
      if (row.white != null) assigned.add(row.white);
    });
    const available = DB.getPlayers().filter(p => checkedIds.has(p.id) && !assigned.has(p.id));
    const pool = document.getElementById('availablePool');
    pool.innerHTML = available.length === 0
      ? '<span style="color:#aaa;font-size:12px;align-self:center;padding:4px">全員が手合いに組まれました</span>'
      : available.map(p => chipHtml(p.id, 'pool')).join('');
  }

  function renderPairingUI() {
    renderAvailablePool();
    Object.keys(boardPairings).forEach(num => {
      renderSlot(parseInt(num), 'black');
      renderSlot(parseInt(num), 'white');
    });
  }

  function removePlayerFromBoard(playerId) {
    Object.keys(boardPairings).forEach(num => {
      if (boardPairings[num].black === playerId) boardPairings[num].black = null;
      if (boardPairings[num].white === playerId) boardPairings[num].white = null;
    });
    renderPairingUI();
  }

  function clearRow(boardNum) {
    boardPairings[boardNum] = { black: null, white: null };
    renderPairingUI();
  }

  function clearAllPairings() {
    Object.keys(boardPairings).forEach(num => {
      boardPairings[num] = { black: null, white: null };
    });
    renderPairingUI();
  }

  // Drag events
  function onChipDragStart(event, playerId, sourceKey) {
    dragData = { playerId, sourceKey };
    event.dataTransfer.effectAllowed = 'move';
    setTimeout(() => event.target.classList.add('dragging'), 0);
  }

  function onChipDragEnd(event) {
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  }

  // Pool drop
  function poolDragOver(event) { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; }
  function poolDragEnter(event) { event.currentTarget.classList.add('drag-over'); }
  function poolDragLeave(event) {
    if (!event.currentTarget.contains(event.relatedTarget))
      event.currentTarget.classList.remove('drag-over');
  }
  function poolDrop(event) {
    event.preventDefault();
    event.currentTarget.classList.remove('drag-over');
    if (!dragData || dragData.sourceKey === 'pool') { dragData = null; return; }
    const { sourceKey } = dragData;
    const parts = sourceKey.split('-'); // slot-N-side
    boardPairings[parseInt(parts[1])][parts[2]] = null;
    renderPairingUI();
    dragData = null;
  }

  // Slot drop
  function slotDragOver(event) { event.preventDefault(); event.dataTransfer.dropEffect = 'move'; }
  function slotDragEnter(event) { event.currentTarget.classList.add('drag-over'); }
  function slotDragLeave(event) {
    if (!event.currentTarget.contains(event.relatedTarget))
      event.currentTarget.classList.remove('drag-over');
  }
  function slotDrop(event, targetBoard, targetSide) {
    event.preventDefault();
    event.currentTarget.classList.remove('drag-over');
    if (!dragData) return;
    const { playerId, sourceKey } = dragData;
    const targetKey = `slot-${targetBoard}-${targetSide}`;
    if (sourceKey === targetKey) { dragData = null; return; }

    const targetOccupant = boardPairings[targetBoard][targetSide];
    boardPairings[targetBoard][targetSide] = playerId;

    if (sourceKey !== 'pool') {
      // Slot → Slot: swap
      const parts = sourceKey.split('-');
      boardPairings[parseInt(parts[1])][parts[2]] = targetOccupant;
      renderSlot(parseInt(parts[1]), parts[2]);
    }
    // Pool → Slot: displaced player auto-returns to pool via renderAvailablePool

    renderSlot(targetBoard, targetSide);
    renderAvailablePool();
    dragData = null;
  }

  // Auto-pair
  function autoPair(method) {
    let selected = DB.getPlayers().filter(p => checkedIds.has(p.id));
    if (selected.length < 2) { alert('2名以上を受付してください。'); return; }

    if (method === 'kyu') {
      selected.sort((a, b) => kyuToNum(a.kyu) - kyuToNum(b.kyu));
    } else if (method === 'swiss') {
      selected.sort((a, b) => getWins(b.id) - getWins(a.id));
    } else {
      selected = selected.slice().sort(() => Math.random() - 0.5);
    }

    // Clear board
    boardCount = 0;
    boardPairings = {};
    document.getElementById('boardRows').innerHTML = '';

    const pairs = Math.floor(selected.length / 2);
    for (let i = 0; i < pairs; i++) {
      const flip = Math.random() < 0.5;
      addBoardRow(
        flip ? selected[i * 2].id : selected[i * 2 + 1].id,
        flip ? selected[i * 2 + 1].id : selected[i * 2].id
      );
    }
    // Odd player stays in pool automatically
    renderAvailablePool();
  }

  function getWins(playerId) {
    return DB.getMatches().filter(m => m.status === 'done' && (
      (m.blackId === playerId && m.result === 'black') ||
      (m.whiteId === playerId && m.result === 'white')
    )).length;
  }

  // Register
  function registerMatches() {
    const pairs = Object.values(boardPairings).filter(r => r.black != null && r.white != null);
    if (pairs.length === 0) { alert('先手・後手が揃っている手合いがありません。'); return; }
    const round = document.getElementById('roundName').value || '手合い';
    const date = document.getElementById('matchDate').value;
    pairs.forEach(pair => {
      DB.addMatch({ date, round, blackId: pair.black, whiteId: pair.white, result: 'pending', status: 'pending', kifu: '' });
    });
    alert(`${pairs.length}局を対局に登録しました。`);
    // Reset board
    boardCount = 0;
    boardPairings = {};
    document.getElementById('boardRows').innerHTML = '';
    for (let i = 0; i < 3; i++) addBoardRow();
    renderAvailablePool();
    renderTodayMatches();
  }

  // ===== 本日の対局一覧 =====
  let pendingResetId = null;

  function playerName(id) {
    const p = DB.getPlayers().find(x => x.id === id);
    return p ? p.name : '―';
  }

  function resultLabel(r) {
    if (r === 'black') return '<span class="badge badge-black">先手勝</span>';
    if (r === 'white') return '<span class="badge badge-white">後手勝</span>';
    if (r === 'draw')  return '<span class="badge badge-draw">引分</span>';
    return '<span class="badge badge-pending">未了</span>';
  }

  function renderTodayMatches() {
    const today = new Date().toISOString().split('T')[0];
    const matches = DB.getMatches().filter(m => m.date === today)
      .sort((a, b) => (a.id || 0) - (b.id || 0));
    const tbody = document.getElementById('todayMatchesBody');
    if (matches.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#999">本日の対局なし</td></tr>';
      return;
    }
    tbody.innerHTML = matches.map(m => `
      <tr>
        <td>${m.round || '―'}</td>
        <td><strong>${playerName(m.blackId)}</strong></td>
        <td><strong>${playerName(m.whiteId)}</strong></td>
        <td>${resultLabel(m.result)}</td>
        <td>${m.status === 'done' ? '<span class="badge badge-done">終了</span>' : '<span class="badge badge-pending">対局中</span>'}</td>
        <td style="white-space:nowrap">
          ${m.status !== 'done'
            ? `<button class="btn btn-sm" style="background:#8b3a3a;color:#fff;padding:4px 8px" onclick="setResult(${m.id},'black')">先手勝</button>
               <button class="btn btn-sm" style="background:#2d4a7a;color:#fff;padding:4px 8px;margin:0 4px" onclick="setResult(${m.id},'white')">後手勝</button>
               <button class="btn btn-outline btn-sm" style="padding:4px 8px" onclick="setResult(${m.id},'draw')">引分</button>`
            : `<button class="btn btn-outline btn-sm" onclick="confirmReset(${m.id})">取消</button>`
          }
        </td>
      </tr>`).join('');
  }

  function setResult(matchId, result) {
    const m = DB.getMatches().find(x => x.id === matchId);
    const wasPending = m && m.status !== 'done';
    DB.updateMatch(matchId, { result, status: 'done' });
    if (wasPending) {
      const promotions = [];
      if (result === 'black') { const p = DB.recordWin(m.blackId); if (p) promotions.push(p); }
      else if (result === 'white') { const p = DB.recordWin(m.whiteId); if (p) promotions.push(p); }
      if (promotions.length) showPromotions(promotions);
    }
    renderTodayMatches();
  }

  function showPromotions(list) {
    document.getElementById('promoContent').innerHTML = list.map(p => {
      const kind = ['初段','二段','三段','四段','五段','六段','七段','八段','九段'].includes(p.to) ? '昇段' : '昇級';
      return `<p style="font-size:16px;font-weight:bold;color:#8b3a3a;margin:4px 0">${p.name} さん</p>
              <p style="font-size:18px;margin:4px 0">${p.from} &rarr; <strong>${p.to}</strong>　${kind}！</p>`;
    }).join('<hr style="margin:14px 0;border-color:#eee">');
    document.getElementById('promoModal').classList.add('open');
  }

  function confirmReset(matchId) {
    pendingResetId = matchId;
    document.getElementById('resetConfirmModal').classList.add('open');
  }

  document.getElementById('resetConfirmModal').addEventListener('click', e => {
    if (e.target === document.getElementById('resetConfirmModal'))
      document.getElementById('resetConfirmModal').classList.remove('open');
  });
  document.getElementById('confirmResetBtn').addEventListener('click', () => {
    if (pendingResetId !== null) {
      DB.updateMatch(pendingResetId, { result: 'pending', status: 'pending' });
      pendingResetId = null;
      document.getElementById('resetConfirmModal').classList.remove('open');
      renderTodayMatches();
    }
  });

  // Initialize
  renderChecklist();
  renderTodayMatches();
  for (let i = 0; i < 3; i++) addBoardRow();
</script>
</body>
</html>
