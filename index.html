      <div class="logo-icon">&#9750;</div>
      <h1>さくら将棋教室<br>対局管理システム</h1>
    </div>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="loginId">ログインID</label>
        <input type="text" id="loginId" name="loginId" placeholder="ログインIDを入力" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="パスワードを入力" autocomplete="current-password" required>
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-full">ログイン</button>
    </form>
  </div>
  <footer class="site-footer">
