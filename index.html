<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 将棋手合いシステム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon">&#9750;</div>
      <h1>将棋手合いシステム</h1>
    </div>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="loginId">ログインID</label>
        <input type="text" id="loginId" name="loginId" placeholder="ログインIDを入力" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="パスワードを入力" autocomplete="current-password" required>
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-full">ログイン</button>
    </form>
  </div>
  <footer class="site-footer">
    <a href="terms.html">利用規約</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="law.html">特定商取引法に基づく表記</a>
  </footer>
  <script src="js/auth.js"></script>
</body>
</html>
